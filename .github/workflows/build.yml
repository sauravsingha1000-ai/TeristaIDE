name: Build and test

on:
  push:
    branches: [ "dev", "main", "release/**" ]
    paths-ignore:
      - '**.md'
      - 'fastlane/**'
      - '.github/workflows/crowdin_contributors.yml'
  pull_request:
    branches: [ "dev" ]
  workflow_dispatch: { }

env:
  BUILD_JAVA_VERSION: '17'
  BUILD_JAVA_DIST: 'temurin'

jobs:
  build_apk:
    strategy:
      matrix:
        build_type: ['debug']
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Cancel previous runs
        uses: styfle/cancel-workflow-action@0.12.0
        with:
          access_token: ${{ github.token }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.BUILD_JAVA_VERSION }}
          distribution: ${{ env.BUILD_JAVA_DIST }}

      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew

      - name: Restore cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Assemble ${{ matrix.build_type }} APK
        run: |
          ./gradlew :app:assembleDebug \
            -x :subprojects:builder-model-impl:compileKotlin \
            -x :subprojects:jaxp:compileJava \
            -x :subprojects:builder-model-impl:compileJava \
            --no-daemon --stacktrace

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TeristaIDE-Debug-APKs
          path: app/build/outputs/apk/debug/*.apk

  run_unit_tests:
    if: false
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Skipped
        run: echo "Skipped"
        
